title: "The Top-1% Claude Code Setup"
description: "Hooks, skills, 36 specialist agents, 5 MCPs, four-tier memory — the full stack."
author: Saugata Paul
url: "https://saugatapaul1010.github.io"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
permalink: /:title/

theme: minima

exclude:
  - node_modules
  - package.json
  - package-lock.json
