  - render.py
  - scripts
  - source
  - GEMINI_VALIDATION_PROMPT.md
  - GEMINI_REVALIDATION_PROMPT.md
  - "top-1-claude-code-setup.md"
  - "top-1-claude-code-setup.md.bak"
  - "top-1-claude-code-setup (Copy 2).md"
  - "top-1-claude-code-setup.backup.md"
  - README.md
  - vendor
  - Gemfile
  - Gemfile.lock

include:
  - diagrams
